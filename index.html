        </span>}
      </div>
      {/* grid */}
      <div style={{overflow:'auto',flex:1,padding:'8px 12px'}}>
        <table style={{borderCollapse:'collapse',minWidth:820}}>
          <thead>
            <tr>
              <th style={{width:54,padding:'4px 6px',color:'#94a3b8',fontSize:11,fontWeight:500}}></th>
              {week.map((d,di)=>{
                const ds=d.toISOString().slice(0,10);
                const isExam=examDays.includes(ds);
                const isToday=ds===today;
                const cs=vProf==='all'?visProfs.length:1;
                return(
                  <th key={di} colSpan={cs} style={{padding:'3px 2px',minWidth:cs*90}}>
                    <div onClick={()=>toggleExam(ds)}
                      style={{borderRadius:8,padding:'5px 8px',cursor:isAdmin?'pointer':'default',
                        background:isExam?'#fff7ed':isToday?'#eff6ff':'transparent',
                        border:isExam?'1.5px dashed #f97316':isToday?'1.5px solid #3b82f6':'1.5px solid transparent',
                        transition:'background .15s'}}>
                      <div style={{fontSize:10,color:'#94a3b8',fontWeight:500}}>{DAY_NAMES[di]}</div>
                      <div style={{fontSize:14,fontWeight:800,color:isToday?'#2563eb':isExam?'#c2410c':'#091426'}}>{d.getDate()}</div>
                      {isExam&&<div style={{fontSize:9,color:'#ea580c',fontWeight:700}}>EXAMEN</div>}
                    </div>
                  </th>
                );
              })}
            </tr>
            {vProf==='all'&&(
              <tr>
                <th/>
                {week.map((_,di)=>visProfs.map(prof=>(
                  <th key={`sh_${di}_${prof.id}`} style={{padding:'2px 2px',fontSize:10}}>
                    <span style={{color:prof.color,fontWeight:700}}>{prof.name}</span>
                  </th>
                )))}
              </tr>
            )}
          </thead>
          <tbody>
            {TIME_SLOTS.map(time=>(
              <tr key={time} style={{borderTop:'1px solid #f1f5f9'}}>
                <td style={{padding:'2px 6px',fontSize:10,color:'#94a3b8',verticalAlign:'top',whiteSpace:'nowrap'}}>{time}</td>
                {week.map((d,di)=>{
                  const ds=d.toISOString().slice(0,10);
                  const isExam=examDays.includes(ds);
                  return visProfs.map(prof=>{
                    const cs=Object.values(slots).filter(s=>s.date===ds&&s.time===time&&s.profId===prof.id&&(fType==='all'||s.slotType===fType));
                    return(
                      <td key={`${di}_${prof.id}`} style={{padding:2,verticalAlign:'top',width:90}}>
                        {isExam?(
                          <div style={{height:38,borderRadius:5,background:'#fff7ed',
                            border:'1px dashed #fed7aa',display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <Icon name="event_busy" size={14} style={{color:'#f97316'}}/>
                          </div>
                        ):(
                          <>
                            {cs.map(slot=>{
                              const stu=students.find(s=>s.id===slot.studentId);
                              const isPrac=slot.slotType!=='examen';
                              const isAuto=stu?.vehicleType==='automatico';
                              const isMoto=stu?.vehicleType==='moto';
                              const dur=slot.duration||(stu?calcDuration(slot.profId,slot.date,slot.time,stu.vehicleType,slots):45);
                              return(
                                <div key={slot.id} className="slot-card" onClick={()=>setEditing(slot)}
                                  style={{background:isPrac?'#1e3a8a':'#581c87',
                                    borderLeft:`3px solid ${isPrac?'#93c5fd':'#c084fc'}`}}>
                                  <div style={{display:'flex',alignItems:'center',gap:3}}>
                                    <div style={{fontSize:10,fontWeight:600,color:'#f1f5f9',
                                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{stu?.name||'?'}</div>
                                    {isAuto&&<span style={{fontSize:8,fontWeight:800,background:'#a855f7',color:'#fff',padding:'0 3px',borderRadius:2,flexShrink:0}}>A</span>}
                                    {isMoto&&<Icon name="two_wheeler" size={9} style={{color:'#6ee7b7',flexShrink:0}}/>}
                                  </div>
                                  <div style={{fontSize:9,color:'rgba(255,255,255,.6)',display:'flex',justifyContent:'space-between'}}>
                                    <span>{slot.confirmed?'✓':'…'} {isPrac?'Práct.':'Exam.'}</span>
                                    <span style={{color:dur===60?'#fcd34d':'rgba(255,255,255,.5)'}}>{dur}′</span>
                                  </div>
                                </div>
                              );
                            })}
                            {isAdmin&&cs.length===0&&(
                              <div onClick={()=>setAdding({date:ds,time,profId:prof.id})}
                                style={{height:34,border:'1px dashed #e2e8f0',borderRadius:5,
                                  display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'border .15s'}}
                                onMouseEnter={e=>e.currentTarget.style.borderColor='#94a3b8'}
                                onMouseLeave={e=>e.currentTarget.style.borderColor='#e2e8f0'}>
                                <Icon name="add" size={13} style={{color:'#cbd5e1'}}/>
                              </div>
                            )}
                          </>
                        )}
                      </td>
                    );
                  });
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {adding&&<Modal title="Nueva clase" onClose={()=>setAdding(null)}>
        <SlotForm slot={adding} students={students} vehicles={vehicles} professors={professors} isAdmin={isAdmin} onSave={saveSlot} onClose={()=>setAdding(null)}/>
      </Modal>}
      {editing&&<Modal title="Detalle de clase" onClose={()=>setEditing(null)}>
        <SlotForm slot={editing} students={students} vehicles={vehicles} professors={professors} isAdmin={isAdmin} onSave={saveSlot} onClose={()=>setEditing(null)}/>
        {isAdmin&&<div style={{marginTop:16,paddingTop:16,borderTop:'1px solid #f1f5f9'}}>
          <button onClick={()=>delSlot(editing.id)} className={btnR}><Icon name="delete" size={17}/>Eliminar clase</button>
        </div>}
      </Modal>}
    </div>
  );
}

// ─── MENSAJES + BOT SIMULATOR ─────────────────────────────────────────────────
function BotSim({students,slots,professors}){
  const allStudents=students.filter(s=>s.active);
  const [stuId,setStuId]=useState(allStudents[0]?.id||'');
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState('');
  const [phase,setPhase]=useState('idle'); // idle | asked | done
  const [selectedSlot,setSelectedSlot]=useState(null);
  const ref=useRef();

  const stu=students.find(s=>s.id===stuId);
  const prof=professors.find(p=>p.id===stu?.profId);
  const stuSlots=Object.values(slots).filter(s=>s.studentId===stuId&&!s.confirmed)
    .sort((a,b)=>a.date+a.time>b.date+b.time?1:-1).slice(0,1);

  useEffect(()=>{ref.current&&(ref.current.scrollTop=ref.current.scrollHeight);},[msgs]);

  const resetSim=()=>{setMsgs([]);setPhase('idle');setSelectedSlot(null);setInput('');};

  const startBot=()=>{
    if(!stu||stuSlots.length===0){
      setMsgs([{from:'bot',text:'Este alumno no tiene clases pendientes de confirmar esta semana.'}]);
      return;
    }
    const slot=stuSlots[0];
    setSelectedSlot(slot);
    const msg=`Hola ${stu.name.split(' ')[0]}! 👋\n\nSoy el asistente de ${prof?.name||'tu profesor'} de la autoescuela.\n\nTienes clase de conducir programada:\n📅 ${slot.date}\n🕐 ${slot.time}h\n🚗 Con ${prof?.name}\n\n¿Confirmas tu asistencia? Responde:\n✅ *SÍ* — Confirmo\n❌ *NO* — No puedo ir`;
    setMsgs([{from:'bot',text:msg}]);
    setPhase('asked');
  };

  const sendMsg=()=>{
    if(!input.trim()||phase==='idle')return;
    const userMsg=input.trim();
    setMsgs(m=>[...m,{from:'user',text:userMsg}]);
    setInput('');
    const lower=userMsg.toLowerCase();
    const isYes=/^(si|sí|yes|confirmo|ok|claro|vale|de acuerdo|1|✅)/i.test(lower);
    const isNo=/^(no|cancel|no puedo|no voy|2|❌)/i.test(lower);
    setTimeout(()=>{
      if(phase==='asked'){
        if(isYes){
          setMsgs(m=>[...m,{from:'bot',text:`✅ ¡Perfecto, ${stu.name.split(' ')[0]}! Tu clase del ${selectedSlot?.date} a las ${selectedSlot?.time}h queda confirmada. Te mandamos un recordatorio 48h antes. ¡Hasta pronto! 👍`}]);
          setPhase('done');
        } else if(isNo){
          setMsgs(m=>[...m,{from:'bot',text:`❌ Entendido. He cancelado tu clase del ${selectedSlot?.date} a las ${selectedSlot?.time}h.\n\n📢 He notificado a ${prof?.name} y al administrador.\n\n¿Quieres reservar otro día? Escríbenos cuando puedas.`}]);
          setPhase('done');
        } else {
          setMsgs(m=>[...m,{from:'bot',text:`No he entendido tu respuesta 😅\nPor favor responde solo:\n✅ *SÍ* para confirmar\n❌ *NO* para cancelar`}]);
        }
      }
    },800);
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:16}}>
      <Card style={{padding:16}}>
        <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <Icon name="smart_toy" size={22} style={{color:'#1e3a5f'}}/>
          <span style={{fontWeight:600,color:'#091426',fontSize:14}}>Simulador del bot WhatsApp</span>
          <span style={{fontSize:12,color:'#64748b'}}>— Simula exactamente lo que verá el alumno en su móvil</span>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
            <select className={inp} style={{width:200}} value={stuId} onChange={e=>{setStuId(e.target.value);resetSim();}}>
              {allStudents.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
            <button onClick={resetSim} className={btnG} style={{whiteSpace:'nowrap'}}><Icon name="refresh" size={16}/>Reset</button>
            <button onClick={startBot} className={btnO} style={{whiteSpace:'nowrap'}}><Icon name="send" size={16}/>Iniciar bot</button>
          </div>
        </div>
      </Card>

      <div style={{display:'flex',gap:16,flex:1,minHeight:0}}>
        {/* Chat */}
        <div style={{flex:1,display:'flex',flexDirection:'column',borderRadius:12,
          border:'1px solid #e2e8f0',overflow:'hidden',background:'#fff'}}>
          <div style={{background:'#075e54',padding:'12px 16px',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:38,height:38,borderRadius:'50%',background:'#128c7e',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:'#fff'}}>
              {stu?stu.name.slice(0,1):'?'}
            </div>
            <div>
              <div style={{fontWeight:600,color:'#fff',fontSize:14}}>{stu?.name||'Selecciona alumno'}</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,.7)'}}>AutoEscuela Bot · WhatsApp</div>
            </div>
          </div>
          <div className="chat-area" ref={ref} style={{flex:1}}>
            {msgs.length===0&&(
              <div style={{textAlign:'center',color:'#94a3b8',marginTop:40}}>
                <Icon name="chat_bubble_outline" size={40} style={{marginBottom:8}}/>
                <div style={{fontSize:13}}>Pulsa "Iniciar bot" para ver la conversación</div>
              </div>
            )}
            {msgs.map((m,i)=>(
              <div key={i} style={{display:'flex',justifyContent:m.from==='bot'?'flex-start':'flex-end'}}>
                <div className={m.from==='bot'?'bubble-bot':'bubble-user'}
                  style={{whiteSpace:'pre-line'}}>{m.text}</div>
              </div>
            ))}
          </div>
          {phase==='asked'&&(
            <div style={{padding:'10px 12px',borderTop:'1px solid #e2e8f0',display:'flex',gap:8}}>
              <input className={inp} value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&sendMsg()}
                placeholder='Escribe "SÍ" o "NO"…' style={{flex:1}}/>
              <button onClick={sendMsg} className={btnO}><Icon name="send" size={17}/></button>
            </div>
          )}
          {phase==='asked'&&(
            <div style={{padding:'8px 12px',display:'flex',gap:6,borderTop:'1px solid #f1f5f9'}}>
              <button onClick={()=>{setInput('SÍ');setTimeout(sendMsg,10)}}
                style={{flex:1,padding:'8px',borderRadius:8,border:'1px solid #86efac',
                  background:'#dcfce7',color:'#166534',fontWeight:700,cursor:'pointer',fontSize:13}}>
                ✅ SÍ, confirmo
              </button>
              <button onClick={()=>{setInput('NO');setTimeout(sendMsg,10)}}
                style={{flex:1,padding:'8px',borderRadius:8,border:'1px solid #fca5a5',
                  background:'#fee2e2',color:'#991b1b',fontWeight:700,cursor:'pointer',fontSize:13}}>
                ❌ NO, cancelo
              </button>
            </div>
          )}
        </div>
        {/* Flujo info */}
        <div style={{width:260,display:'flex',flexDirection:'column',gap:12}}>
          <Card style={{padding:16}}>
            <div style={{fontWeight:600,color:'#091426',fontSize:13,marginBottom:12}}>Flujo automático</div>
            {[
              {day:'Mar–Jue',txt:'Bot envía mensaje a todos los alumnos con clases la semana siguiente',icon:'schedule',c:'#1e3a5f'},
              {day:'Alumno SÍ',txt:'Clase se marca como confirmada en el calendario',icon:'check_circle',c:'#0e6856'},
              {day:'Alumno NO',txt:'Clase se elimina y se notifica a admin y profesor',icon:'cancel',c:'#b91c1c'},
              {day:'Sin resp.',txt:'Clase queda pendiente, no se cancela',icon:'help',c:'#b45309'},
              {day:'48h antes',txt:'Recordatorio automático enviado al alumno',icon:'notifications',c:'#7c2d8c'},
            ].map(({day,txt,icon,c})=>(
              <div key={day} style={{display:'flex',gap:8,marginBottom:10,alignItems:'flex-start'}}>
                <Icon name={icon} size={16} style={{color:c,flexShrink:0,marginTop:1}}/>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:c}}>{day}</div>
                  <div style={{fontSize:11,color:'#64748b',lineHeight:1.4}}>{txt}</div>
                </div>
              </div>
            ))}
          </Card>
          <Card style={{padding:16}}>
            <div style={{fontWeight:600,color:'#091426',fontSize:13,marginBottom:8}}>Estado alumno seleccionado</div>
            {stu?(
              <div style={{fontSize:12,color:'#475569'}}>
                <div style={{display:'flex',gap:8,marginBottom:6,alignItems:'center'}}>
                  <Avatar name={stu.name} color={prof?.color||'#64748b'} size={28}/>
                  <div>
                    <div style={{fontWeight:600,color:'#091426'}}>{stu.name}</div>
                    <div style={{color:'#94a3b8'}}>{prof?.name}</div>
                  </div>
                </div>
                <div>Clases pendientes de confirmar: <strong>{stuSlots.length}</strong></div>
                <div>Teléfono: <strong>{stu.phone}</strong></div>
              </div>
            ):<div style={{fontSize:12,color:'#94a3b8'}}>Selecciona un alumno</div>}
          </Card>
        </div>
      </div>
    </div>
  );
}

function Mensajes({students,slots,professors,user}){
  const isAdmin=user.role==='admin';
  const [tab,setTab]=useState('confirmaciones');
  const today=new Date();
  const dow=today.getDay();
  const isWindow=dow>=2&&dow<=4;
  const nWS=new Date(today);nWS.setDate(today.getDate()+(8-dow));nWS.setHours(0,0,0,0);
  const nWE=new Date(nWS);nWE.setDate(nWS.getDate()+5);
  const slotArr=Object.values(slots).filter(s=>isAdmin||s.profId===user.id);
  const nwSlots=slotArr.filter(s=>{const d=new Date(s.date);return d>=nWS&&d<=nWE;});
  const pending=nwSlots.filter(s=>!s.confirmed);
  const in48=new Date(today.getTime()+48*3600*1000);
  const reminders=slotArr.filter(s=>{const dt=new Date(`${s.date}T${s.time}:00`);return dt>=today&&dt<=in48;});
  const wa=(phone,msg)=>`https://wa.me/34${phone}?text=${encodeURIComponent(msg)}`;

  const tabs=[
    {id:'confirmaciones',label:`Confirmaciones (${pending.length} pend.)`},
    {id:'recordatorios', label:`Recordatorios 48h (${reminders.length})`},
    {id:'simulador',     label:'🤖 Simulador del bot'},
  ];

  return(
    <div style={{padding:24,overflowY:'auto',height:'100%',display:'flex',flexDirection:'column',gap:16}}>
      <div>
        <SectionTitle>Mensajes WhatsApp</SectionTitle>
        <div style={{borderRadius:10,padding:'12px 16px',display:'flex',alignItems:'center',gap:10,marginBottom:16,
          background:isWindow?'#f0fdf4':'#f8fafc',border:`1px solid ${isWindow?'#86efac':'#e2e8f0'}`}}>
          <Icon name={isWindow?'check_circle':'schedule'} size={20} style={{color:isWindow?'#16a34a':'#d97706'}}/>
          <div>
            <div style={{fontWeight:600,color:'#091426',fontSize:13}}>
              {isWindow?'✅ Ventana de confirmación ACTIVA — Mar a Jue':'⏳ Fuera de ventana de confirmación'}
            </div>
            <div style={{fontSize:12,color:'#64748b'}}>El bot envía confirmaciones automáticas de martes a jueves para la semana siguiente</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{padding:'7px 14px',borderRadius:8,fontSize:13,fontWeight:500,cursor:'pointer',
                background:tab===t.id?'#091426':'#fff',color:tab===t.id?'#fff':'#64748b',
                border:`1px solid ${tab===t.id?'#091426':'#e2e8f0'}`,transition:'all .15s'}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {tab==='confirmaciones'&&(
        <div>
          <div style={{fontSize:12,color:'#94a3b8',marginBottom:10}}>
            Semana {nWS.toLocaleDateString('es-ES')} – {nWE.toLocaleDateString('es-ES')}
          </div>
          <Card style={{overflow:'hidden'}}>
            {nwSlots.length===0&&<div style={{padding:32,textAlign:'center',color:'#94a3b8'}}>No hay clases la próxima semana</div>}
            {nwSlots.map(slot=>{
              const stu=students.find(s=>s.id===slot.studentId);
              const prof=professors.find(p=>p.id===slot.profId);
              const msg=`Hola ${stu?.name?.split(' ')[0]||''}! 👋 Tienes clase el ${slot.date} a las ${slot.time}h con ${prof?.name}. ¿Confirmas? Responde SÍ o NO.`;
              return(
                <div key={slot.id} style={{display:'flex',alignItems:'center',gap:12,
                  padding:'10px 16px',borderBottom:'1px solid #f8fafc'}}>
                  <div style={{width:48,fontSize:11,textAlign:'center',flexShrink:0}}>
                    <div style={{fontWeight:700,color:'#091426'}}>{slot.time}</div>
                    <div style={{color:'#94a3b8'}}>{slot.date.slice(5).replace('-','/')}</div>
                  </div>
                  {stu&&<Avatar name={stu.name} color={prof?.color||'#64748b'} size={28}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#091426',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{stu?.name}</div>
                    <div style={{fontSize:11,color:'#64748b'}}>{stu?.phone} · {prof?.name}</div>
                  </div>
                  <Chip ok={slot.confirmed} label={slot.confirmed?'Confirmado':'Pendiente'}/>
                  {stu?.phone&&(
                    <a href={wa(stu.phone,msg)} target="_blank" rel="noreferrer"
                      style={{display:'inline-flex',alignItems:'center',gap:4,padding:'5px 10px',
                        borderRadius:6,fontSize:12,fontWeight:600,color:'#fff',
                        background:'#16a34a',textDecoration:'none',flexShrink:0}}>
                      <Icon name="chat" size={14}/>WhatsApp
                    </a>
                  )}
                </div>
              );
            })}
          </Card>
        </div>
      )}

      {tab==='recordatorios'&&(
        <div>
          <div style={{fontSize:12,color:'#94a3b8',marginBottom:10}}>Clases en las próximas 48 horas</div>
          <Card style={{overflow:'hidden'}}>
            {reminders.length===0&&<div style={{padding:32,textAlign:'center',color:'#94a3b8'}}>No hay clases en las próximas 48h</div>}
            {reminders.map(slot=>{
              const stu=students.find(s=>s.id===slot.studentId);
              const prof=professors.find(p=>p.id===slot.profId);
              const dt=new Date(`${slot.date}T${slot.time}:00`);
              const h=Math.round((dt-today)/3600000);
              const msg=`⏰ Recordatorio: tienes clase mañana ${slot.date} a las ${slot.time}h con ${prof?.name}. ¡Nos vemos pronto! 🚗`;
              return(
                <div key={slot.id} style={{display:'flex',alignItems:'center',gap:12,
                  padding:'10px 16px',borderBottom:'1px solid #f8fafc'}}>
                  <div style={{width:48,fontSize:11,textAlign:'center',flexShrink:0}}>
                    <div style={{fontWeight:700,color:'#091426'}}>{slot.time}</div>
                    <div style={{color:'#d97706',fontWeight:700,fontSize:12}}>{h}h</div>
                  </div>
                  {stu&&<Avatar name={stu.name} color={prof?.color||'#64748b'} size={28}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#091426',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{stu?.name}</div>
                    <div style={{fontSize:11,color:'#64748b'}}>{stu?.phone}</div>
                  </div>
                  {stu?.phone&&(
                    <a href={wa(stu.phone,msg)} target="_blank" rel="noreferrer"
                      style={{display:'inline-flex',alignItems:'center',gap:4,padding:'5px 10px',
                        borderRadius:6,fontSize:12,fontWeight:600,color:'#fff',
                        background:'#d97706',textDecoration:'none',flexShrink:0}}>
                      <Icon name="notifications" size={14}/>Recordar
                    </a>
                  )}
                </div>
              );
            })}
          </Card>
        </div>
      )}

      {tab==='simulador'&&(
        <div style={{flex:1,minHeight:500}}>
          <BotSim students={students} slots={slots} professors={professors}/>
        </div>
      )}
    </div>
  );
}

// ─── ESTADÍSTICAS ─────────────────────────────────────────────────────────────
function Bar({value,max,color}){
  const pct=max?Math.round(value/max*100):0;
  return(
    <div style={{height:8,background:'#f1f5f9',borderRadius:4,overflow:'hidden'}}>
      <div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:4,transition:'width .6s'}}/>
    </div>
  );
}
function Estadisticas({students,slots,professors,user}){
  const isAdmin=user.role==='admin';
  const myS=isAdmin?students:students.filter(s=>s.profId===user.id);
  const slotArr=Object.values(slots).filter(s=>isAdmin||s.profId===user.id);
  const today=new Date();
  const mStart=new Date(today.getFullYear(),today.getMonth(),1);
  const mSlots=slotArr.filter(s=>new Date(s.date)>=mStart);
  const stats=[
    {icon:'school',     label:'Alumnos activos',   value:myS.filter(s=>s.active).length,             color:'#1e3a5f',bg:'#dbeafe'},
    {icon:'calendar_month',label:'Clases este mes',value:mSlots.length,                              color:'#0e6856',bg:'#d1fae5'},
    {icon:'assignment', label:'Exámenes',           value:slotArr.filter(s=>s.slotType==='examen').length, color:'#7c2d8c',bg:'#fae8ff'},
    {icon:'warning',    label:'Tasas pendientes',   value:myS.filter(s=>!s.tasasPagadas&&s.active).length,color:'#b91c1c',bg:'#fee2e2'},
  ];
  return(
    <div style={{padding:24,overflowY:'auto',height:'100%'}}>
      <SectionTitle>Estadísticas</SectionTitle>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {stats.map(s=>(
          <Card key={s.label} style={{padding:18}}>
            <div style={{background:s.bg,borderRadius:9,padding:9,display:'inline-flex',marginBottom:10}}>
              <Icon name={s.icon} size={22} style={{color:s.color}}/>
            </div>
            <div style={{fontSize:28,fontWeight:800,color:'#091426',lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:12,color:'#64748b',marginTop:5}}>{s.label}</div>
          </Card>
        ))}
      </div>
      {isAdmin&&(
        <Card style={{padding:20}}>
          <div style={{fontWeight:600,color:'#091426',marginBottom:16,fontSize:14}}>Clases este mes por profesor</div>
          {professors.map(prof=>{
            const cnt=mSlots.filter(s=>s.profId===prof.id).length;
            const mx=Math.max(...professors.map(p=>mSlots.filter(s=>s.profId===p.id).length),1);
            return(
              <div key={prof.id} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontSize:13,fontWeight:600,color:'#091426'}}>{prof.name}</span>
                  <span style={{fontSize:13,fontWeight:700,color:prof.color}}>{cnt} clases</span>
                </div>
                <Bar value={cnt} max={mx} color={prof.color}/>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

// ─── DISPONIBILIDAD ───────────────────────────────────────────────────────────
const AVAIL_HOURS=['08:00','09:00','10:00','11:00','12:00','13:00','15:00','16:00','17:00','18:00','19:00'];
const AVAIL_DAYS=[{key:'lun',label:'Lunes'},{key:'mar',label:'Martes'},{key:'mie',label:'Miércoles'},
  {key:'jue',label:'Jueves'},{key:'vie',label:'Viernes'},{key:'sab',label:'Sábado'}];

function defaultAvail(){
  const a={};
  PROFESSORS.forEach(p=>{
    a[p.id]={};
    AVAIL_DAYS.forEach(d=>{
      a[p.id][d.key]=d.key==='sab'?[]:['09:00','10:00','11:00','16:00','17:00','18:00'];
    });
  });
  return a;
}

function Disponibilidad({user,professors,slots,setSlots}){
  const [avail,setAvail]=useState(()=>load('crm_avail_v1',null)||defaultAvail());
  const [blocked,setBlocked]=useState(()=>load('crm_blocked_v1',{}));
  const [selProf,setSelProf]=useState(user.role==='profesor'?user.id:professors[0]?.id);
  const [tab,setTab]=useState('disponibilidad'); // 'disponibilidad' | 'bloquear'
  const [saved,setSaved]=useState(false);

  useEffect(()=>save('crm_avail_v1',avail),[avail]);
  useEffect(()=>save('crm_blocked_v1',blocked),[blocked]);

  const isAdmin=user.role==='admin';
  const viewProf=isAdmin?selProf:user.id;
  const prof=professors.find(p=>p.id===viewProf)||professors[0];

  // ── Disponibilidad semanal ─────────────────────────
  function toggle(day,hour){
    setAvail(prev=>{
      const cur=(prev[viewProf]?.[day])||[];
      const next=cur.includes(hour)?cur.filter(h=>h!==hour):[...cur,hour].sort();
      return {...prev,[viewProf]:{...prev[viewProf],[day]:next}};
    });
    setSaved(false);
  }
  function setDay(day,on){
    setAvail(prev=>({...prev,[viewProf]:{...prev[viewProf],[day]:on?[...AVAIL_HOURS]:[]}}));
    setSaved(false);
  }

  // ── Bloquear hora semana siguiente ────────────────
  // nextWeek dates (Lun-Sáb)
  function getNextWeekDates(){
    const now=new Date();const dow=now.getDay();
    const diff=dow===0?1:8-dow;
    const mon=new Date(now);mon.setDate(now.getDate()+diff);mon.setHours(0,0,0,0);
    return [0,1,2,3,4,5].map(i=>{
      const d=new Date(mon);d.setDate(mon.getDate()+i);
      const ds=d.toISOString().split('T')[0];
      return {date:ds,label:['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'][i]};
    });
  }
  const nextWeek=getNextWeekDates();

  function toggleBlock(date,hour){
    const key=`${viewProf}_${date}_${hour}`;
    setBlocked(prev=>{
      const next={...prev};
      if(next[key]) delete next[key];
      else next[key]={profId:viewProf,date,hour,blockedAt:Date.now()};
      return next;
    });
    setSaved(false);
  }
  function isBlocked(date,hour){
    return !!blocked[`${viewProf}_${date}_${hour}`];
  }
  function hasSlotBooked(date,hour){
    if(!slots) return false;
    const arr=Array.isArray(slots)?slots:Object.values(slots);
    return arr.some(s=>s.profId===viewProf&&s.date===date&&s.time===hour&&s.studentId&&s.status!=='cancelled');
  }

  function handleSave(){
    save('crm_avail_v1',avail);
    save('crm_blocked_v1',blocked);
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  }

  const profAvail=avail[viewProf]||{};
  const totalHours=Object.values(profAvail).flat().length;
  const totalBlocked=Object.keys(blocked).filter(k=>k.startsWith(viewProf)).length;

  return(
    <div style={{height:'100%',overflow:'auto',padding:24}}>
      <div style={{maxWidth:960,margin:'0 auto'}}>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <h1 style={{fontSize:20,fontWeight:700,color:'#091426'}}>
              {isAdmin?'Disponibilidad de profesores':'Mi disponibilidad'}
            </h1>
            <p style={{fontSize:13,color:'#64748b',marginTop:3}}>
              Gestiona los horarios disponibles y bloquea huecos para la semana siguiente
            </p>
          </div>
          <button onClick={handleSave}
            style={{display:'flex',alignItems:'center',gap:6,padding:'9px 18px',borderRadius:8,
              fontSize:13,fontWeight:600,cursor:'pointer',border:'none',
              background:saved?'#16a34a':'#fd761a',color:'#fff',transition:'background .3s'}}>
            <Icon name={saved?'check_circle':'save'} size={16}/>
            {saved?'¡Guardado!':'Guardar cambios'}
          </button>
        </div>

        {/* Selector de profesor (solo admin) */}
        {isAdmin&&(
          <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
            {professors.map(p=>(
              <button key={p.id} onClick={()=>setSelProf(p.id)}
                style={{display:'flex',alignItems:'center',gap:8,padding:'8px 16px',borderRadius:8,
                  fontSize:13,fontWeight:600,cursor:'pointer',border:'2px solid',transition:'all .15s',
                  borderColor:selProf===p.id?p.color:'#e2e8f0',
                  background:selProf===p.id?p.color+'18':'#fff',
                  color:selProf===p.id?p.color:'#64748b'}}>
                <Avatar name={p.name} color={p.color} size={22}/>{p.name}
              </button>
            ))}
          </div>
        )}

        {/* Tabs */}
        <div style={{display:'flex',gap:4,marginBottom:20,borderBottom:'2px solid #e2e8f0',paddingBottom:0}}>
          {[{id:'disponibilidad',icon:'schedule',label:`Horario habitual (${totalHours}h/sem)`},
            {id:'bloquear',icon:'block',label:`Bloquear semana siguiente${totalBlocked>0?` (${totalBlocked} bloqueadas)`:''}`}
          ].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{display:'flex',alignItems:'center',gap:6,padding:'8px 16px',fontSize:13,fontWeight:600,
                cursor:'pointer',border:'none',background:'transparent',transition:'all .15s',
                color:tab===t.id?'#fd761a':'#64748b',
                borderBottom:tab===t.id?'2px solid #fd761a':'2px solid transparent',
                marginBottom:-2}}>
              <Icon name={t.icon} size={16}/>{t.label}
            </button>
          ))}
        </div>

        {/* ── TAB 1: Disponibilidad habitual ── */}
        {tab==='disponibilidad'&&(
          <>
            <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
              <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:'10px 16px',flex:1,minWidth:120}}>
                <div style={{fontSize:22,fontWeight:700,color:prof?.color||'#fd761a'}}>{totalHours}</div>
                <div style={{fontSize:11,color:'#64748b'}}>horas/semana</div>
              </div>
              {AVAIL_DAYS.map(d=>{
                const hrs=(profAvail[d.key]||[]).length;
                return(
                  <div key={d.key} style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,
                    padding:'10px 14px',minWidth:72,textAlign:'center'}}>
                    <div style={{fontSize:15,fontWeight:700,color:hrs>0?'#091426':'#cbd5e1'}}>{hrs}</div>
                    <div style={{fontSize:11,color:'#94a3b8'}}>{d.label}</div>
                  </div>
                );
              })}
            </div>
            <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:'72px repeat(6,1fr)',background:'#f8f9ff',borderBottom:'1px solid #e2e8f0'}}>
                <div style={{padding:'10px 10px',fontSize:10,color:'#94a3b8',fontWeight:600}}>HORA</div>
                {AVAIL_DAYS.map(d=>{
                  const allOn=(profAvail[d.key]||[]).length===AVAIL_HOURS.length;
                  const someOn=(profAvail[d.key]||[]).length>0;
                  return(
                    <div key={d.key} style={{padding:'7px 4px',textAlign:'center',borderLeft:'1px solid #e2e8f0'}}>
                      <div style={{fontSize:11,fontWeight:600,color:'#091426',marginBottom:3}}>{d.label}</div>
                      <button onClick={()=>setDay(d.key,!allOn)}
                        style={{fontSize:10,padding:'2px 6px',borderRadius:4,border:'1px solid',cursor:'pointer',fontWeight:600,
                          borderColor:someOn?(prof?.color||'#fd761a'):'#e2e8f0',
                          background:allOn?(prof?.color||'#fd761a'):someOn?(prof?.color||'#fd761a')+'15':'#f8f9ff',
                          color:allOn?'#fff':someOn?(prof?.color||'#fd761a'):'#94a3b8'}}>
                        {allOn?'Todo ✓':someOn?'Parcial':'Todo'}
                      </button>
                    </div>
                  );
                })}
              </div>
              {AVAIL_HOURS.map((hour,hi)=>(
                <div key={hour} style={{display:'grid',gridTemplateColumns:'72px repeat(6,1fr)',
                  borderBottom:hi<AVAIL_HOURS.length-1?'1px solid #f1f5f9':'none',
                  background:hi%2===0?'#fff':'#fafbff'}}>
                  <div style={{padding:'8px 10px',fontSize:12,fontWeight:500,color:'#64748b',display:'flex',alignItems:'center'}}>{hour}</div>
                  {AVAIL_DAYS.map(d=>{
                    const active=(profAvail[d.key]||[]).includes(hour);
                    return(
                      <div key={d.key} style={{borderLeft:'1px solid #f1f5f9',padding:3,display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <button onClick={()=>toggle(d.key,hour)}
                          style={{width:'100%',height:32,borderRadius:6,border:'2px solid',cursor:'pointer',transition:'all .15s',fontWeight:600,fontSize:11,
                            borderColor:active?(prof?.color||'#fd761a'):'#e2e8f0',
                            background:active?(prof?.color||'#fd761a'):'transparent',
                            color:active?'#fff':'#cbd5e1'}}>
                          {active?'✓':''}
                        </button>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
            <p style={{fontSize:12,color:'#94a3b8',marginTop:10,textAlign:'center'}}>
              <Icon name="info" size={13}/> Este horario se repite cada semana. Para bloquear horas puntuales usa la pestaña "Bloquear semana siguiente".
            </p>
          </>
        )}

        {/* ── TAB 2: Bloquear semana siguiente ── */}
        {tab==='bloquear'&&(
          <>
            <div style={{background:'#fff3cd',border:'1px solid #ffc107',borderRadius:10,padding:'10px 16px',
              marginBottom:16,display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#856404'}}>
              <Icon name="warning" size={16}/>
              Las horas marcadas como <strong>bloqueadas</strong> no estarán disponibles para reservar la semana siguiente.
              Las horas que ya tienen alumno aparecen en gris y no se pueden modificar.
            </div>
            <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:'72px repeat(6,1fr)',background:'#f8f9ff',borderBottom:'1px solid #e2e8f0'}}>
                <div style={{padding:'10px 10px',fontSize:10,color:'#94a3b8',fontWeight:600}}>HORA</div>
                {nextWeek.map(wd=>(
                  <div key={wd.date} style={{padding:'7px 4px',textAlign:'center',borderLeft:'1px solid #e2e8f0'}}>
                    <div style={{fontSize:11,fontWeight:600,color:'#091426'}}>{wd.label}</div>
                    <div style={{fontSize:10,color:'#94a3b8'}}>{wd.date.slice(5).replace('-','/')}</div>
                  </div>
                ))}
              </div>
              {AVAIL_HOURS.map((hour,hi)=>(
                <div key={hour} style={{display:'grid',gridTemplateColumns:'72px repeat(6,1fr)',
                  borderBottom:hi<AVAIL_HOURS.length-1?'1px solid #f1f5f9':'none',
                  background:hi%2===0?'#fff':'#fafbff'}}>
                  <div style={{padding:'8px 10px',fontSize:12,fontWeight:500,color:'#64748b',display:'flex',alignItems:'center'}}>{hour}</div>
                  {nextWeek.map(wd=>{
                    const booked=hasSlotBooked(wd.date,hour);
                    const blk=isBlocked(wd.date,hour);
                    return(
                      <div key={wd.date} style={{borderLeft:'1px solid #f1f5f9',padding:3,display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <button onClick={()=>!booked&&toggleBlock(wd.date,hour)}
                          disabled={booked}
                          title={booked?'Hora ya reservada por un alumno':blk?'Click para desbloquear':'Click para bloquear'}
                          style={{width:'100%',height:32,borderRadius:6,border:'2px solid',
                            cursor:booked?'not-allowed':'pointer',transition:'all .15s',fontWeight:700,fontSize:10,
                            borderColor:booked?'#e2e8f0':blk?'#ef4444':'#e2e8f0',
                            background:booked?'#f1f5f9':blk?'#fee2e2':'transparent',
                            color:booked?'#cbd5e1':blk?'#ef4444':'#cbd5e1'}}>
                          {booked?'📅':blk?'🚫':''}
                        </button>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:16,marginTop:10,justifyContent:'center',fontSize:12,color:'#64748b'}}>
              <span>📅 Reservado por alumno</span>
              <span style={{color:'#ef4444'}}>🚫 Bloqueado (bot no ofrecerá)</span>
              <span style={{color:'#94a3b8'}}>□ Libre</span>
            </div>
          </>
        )}

      </div>
    </div>
  );
}

// ─── BOT SYNC ─────────────────────────────────────────────────────────────────
// Convierte slot del bot (array item) a formato CRM (object key)
// ─── CONFIGURACIÓN ───────────────────────────────────────────────────────────
function Configuracion({professors,students,setStudents,setSlots,setExamDays,schoolConfig,setSchoolConfig,onSyncSupabase}){
  const [school,setSchool]=useState({...schoolConfig});
  const [passwords,setPasswords]=useState(loadPasswords());
  const [saved,setSaved]=useState(false);
  const [confirmReset,setConfirmReset]=useState(false);
  const [supaStatus,setSupaStatus]=useState(null); // null | 'testing' | 'ok' | 'error'
  const [supaMsg,setSupaMsg]=useState('');
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState('');

  const userList=[
    {id:'admin',name:'Administrador'},
    ...professors.filter(p=>p.active!==false).map(p=>({id:p.id,name:p.name}))
  ];

  const handleSaveSchool=()=>{
    saveSchool(school);
    setSchoolConfig(school);
    resetSupabase();
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  };

  const handleTestSupabase=async()=>{
    setSupaStatus('testing');setSupaMsg('');
    // Temporarily save current values to test them
    const tmp={...loadSchool(),supabaseUrl:school.supabaseUrl,supabaseAnonKey:school.supabaseAnonKey};
    saveSchool(tmp);resetSupabase();
    const sb=getSupabase();
    if(!sb){setSupaStatus('error');setSupaMsg('Credenciales incompletas');saveSchool(loadSchool());resetSupabase();return;}
    try{
      const {error}=await sb.from('schools').select('id').limit(1);
      if(error)throw error;
      setSupaStatus('ok');setSupaMsg('Conectado correctamente');
    }catch(e){
      setSupaStatus('error');setSupaMsg(e.message||'Error de conexión');
    }
  };

  const handleSyncSupabase=async()=>{
    setSyncing(true);setSyncMsg('');
    try{
      await onSyncSupabase();
      setSyncMsg('Sincronización completada');
    }catch(e){
      setSyncMsg('Error: '+(e.message||'desconocido'));
    }finally{
      setSyncing(false);
    }
  };

  const handlePassChange=(userId,val)=>{
    const next={...passwords,[userId]:val};
    setPasswords(next);
    savePasswords(next);
  };

  const handleResetDemo=()=>{
    // Borrar todos los datos y recargar con datos limpios
    ['crm_students_v3','crm_slots_v4','crm_exam_days_v3','crm_passwords_v1'].forEach(k=>localStorage.removeItem(k));
    setStudents([]);
    setSlots({});
    setExamDays([]);
    setPasswords(DEFAULT_PASSWORDS);
    setConfirmReset(false);
    alert('Datos limpiados. Ahora puedes añadir los alumnos y profesores reales.');
  };

  const COLORS=['#fd761a','#1e3a5f','#7c2d8c','#0e6856','#b45309','#b91c1c','#0369a1','#374151'];

  return(
    <div style={{padding:24,overflowY:'auto',height:'100%',maxWidth:700}}>
      <SectionTitle>Configuración</SectionTitle>

      {/* ── Datos de la autoescuela ── */}
      <Card style={{padding:24,marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:15,color:'#091426',marginBottom:18,display:'flex',alignItems:'center',gap:8}}>
          <Icon name="business" size={18} style={{color:'#fd761a'}}/>Datos de la autoescuela
        </div>
        <F label="Nombre de la autoescuela">
          <input className={inp} value={school.name||''} onChange={e=>setSchool(s=>({...s,name:e.target.value}))}
            placeholder="AutoEscuela García"/>
        </F>
        <F label="URL del bot WhatsApp">
          <input className={inp} value={school.botUrl||'http://localhost:3002'}
            onChange={e=>setSchool(s=>({...s,botUrl:e.target.value}))}
            placeholder="http://localhost:3002 o https://tu-bot.railway.app"/>
        </F>
        <F label="Supabase URL">
          <input className={inp} value={school.supabaseUrl||''}
            onChange={e=>setSchool(s=>({...s,supabaseUrl:e.target.value}))}
            placeholder="https://xxxx.supabase.co"/>
        </F>
        <F label="Supabase Anon Key">
          <input className={inp} value={school.supabaseAnonKey||''}
            onChange={e=>setSchool(s=>({...s,supabaseAnonKey:e.target.value}))}
            placeholder="eyJhbGci..."/>
        </F>
        {(school.supabaseUrl&&school.supabaseAnonKey)&&(
          <div style={{marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
              <button type="button" onClick={handleTestSupabase} className={btnG}
                disabled={supaStatus==='testing'} style={{opacity:supaStatus==='testing'?.6:1}}>
                <Icon name="cable" size={16}/>
                {supaStatus==='testing'?'Probando...':'Probar conexión'}
              </button>
              {supaStatus==='ok'&&<span style={{fontSize:13,color:'#16a34a',fontWeight:600}}>✅ {supaMsg}</span>}
              {supaStatus==='error'&&<span style={{fontSize:13,color:'#dc2626',fontWeight:600}}>❌ {supaMsg}</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:10,flexWrap:'wrap'}}>
              <button type="button" onClick={handleSyncSupabase} className={btnG}
                disabled={syncing} style={{opacity:syncing?.6:1}}>
                <Icon name="cloud_upload" size={16}/>
                {syncing?'Sincronizando...':'Sincronizar con Supabase'}
              </button>
              {syncMsg&&<span style={{fontSize:12,color:'#475569'}}>{syncMsg}</span>}
            </div>
          </div>
        )}
        <F label="Color principal">
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
            {COLORS.map(c=>(
              <button key={c} type="button" onClick={()=>setSchool(s=>({...s,color:c}))}
                style={{width:32,height:32,borderRadius:8,background:c,border:school.color===c?'3px solid #091426':'2px solid transparent',
                  cursor:'pointer',transition:'transform .1s'}}
                onMouseEnter={e=>e.currentTarget.style.transform='scale(1.15)'}
                onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}/>
            ))}
            <input type="color" value={school.color||'#fd761a'} onChange={e=>setSchool(s=>({...s,color:e.target.value}))}
              style={{width:32,height:32,borderRadius:8,border:'1px solid #e2e8f0',cursor:'pointer',padding:2}}/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginTop:6}}>
            <div style={{background:school.color||'#fd761a',borderRadius:8,padding:8,display:'flex'}}>
              <Icon name="directions_car" size={18} style={{color:'#fff'}}/>
            </div>
            <span style={{fontSize:13,fontWeight:700,color:school.color||'#fd761a'}}>{school.name||'AutoEscuela'}</span>
            <span style={{fontSize:11,color:'#94a3b8'}}>← previsualización sidebar</span>
          </div>
        </F>
        <button onClick={handleSaveSchool} className={btnO} style={{marginTop:8}}>
          <Icon name={saved?'check_circle':'save'} size={17}/>
          {saved?'¡Guardado!':'Guardar configuración'}
        </button>
      </Card>

      {/* ── Contraseñas ── */}
      <Card style={{padding:24,marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:15,color:'#091426',marginBottom:6,display:'flex',alignItems:'center',gap:8}}>
          <Icon name="lock" size={18} style={{color:'#1e3a5f'}}/>Contraseñas de acceso
        </div>
        <p style={{fontSize:12,color:'#94a3b8',marginBottom:18}}>
          Los cambios se guardan al instante. Contraseña por defecto: <strong>1234</strong>
        </p>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {userList.map(u=>(
            <div key={u.id} style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:130,fontSize:13,fontWeight:600,color:'#475569',flexShrink:0}}>
                {u.name}
              </div>
              <input type="text" className={inp} style={{maxWidth:200}}
                value={passwords[u.id]||''}
                onChange={e=>handlePassChange(u.id,e.target.value)}
                placeholder="Nueva contraseña"/>
              <span style={{fontSize:11,color:'#94a3b8'}}>
                {passwords[u.id]?`${passwords[u.id].length} caracteres`:'Sin contraseña (usa 1234)'}
              </span>
            </div>
          ))}
        </div>
      </Card>

      {/* ── Zona de peligro ── */}
      <Card style={{padding:24,border:'1px solid #fca5a5'}}>
        <div style={{fontWeight:700,fontSize:15,color:'#b91c1c',marginBottom:6,display:'flex',alignItems:'center',gap:8}}>
          <Icon name="warning" size={18} style={{color:'#b91c1c'}}/>Zona de peligro
        </div>
        <p style={{fontSize:13,color:'#475569',marginBottom:16}}>
          Elimina todos los datos de demo (alumnos, clases, exámenes) y deja el sistema limpio para introducir datos reales. Esta acción no se puede deshacer.
        </p>
        {!confirmReset?(
          <button onClick={()=>setConfirmReset(true)} className={btnR}>
            <Icon name="delete_sweep" size={17}/>Limpiar datos de demo
          </button>
        ):(
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <span style={{fontSize:13,color:'#b91c1c',fontWeight:600}}>¿Seguro? Esto borrará TODO.</span>
            <button onClick={handleResetDemo} className={btnR}><Icon name="delete_forever" size={17}/>Sí, limpiar</button>
            <button onClick={()=>setConfirmReset(false)} className={btnG}>Cancelar</button>
          </div>
        )}
      </Card>
    </div>
  );
}

function botSlotToCRM(s){
  return {
    id:        s.id,
    date:      s.date,
    time:      s.time,
    profId:    s.profId,
    studentId: s.studentId||null,
    vehicleId: s.vehicleId||null,
    slotType:  s.type||'practica',
    confirmed: s.status==='confirmed',
    fromBot:   true,
    cancelled: s.status==='cancelled',
  };
}
// Convierte slot del CRM a formato bot
function crmSlotToBot(key,s){
  return {
    id:          s.id||key,
    studentId:   s.studentId||null,
    profId:      s.profId,
    date:        s.date,
    time:        s.time,
    dayName:     s.dayName||'',
    type:        s.slotType||'practica',
    status:      s.cancelled?'cancelled':s.confirmed?'confirmed':'pending',
    createdBy:   'crm',
    reminderSent:false,
    vehicleId:   s.vehicleId||null,
  };
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{try{const u=sessionStorage.getItem('crm_u');return u?JSON.parse(u):null}catch{return null}});
  const [page,setPage]=useState('dashboard');
  const [professors,setProfessors]=useState(()=>load('crm_professors_v3',PROFESSORS));
  const [vehicles,setVehicles]=useState(()=>load('crm_vehicles_v3',VEHICLES));
  const [students,setStudents]=useState(()=>load('crm_students_v3',null)||seedStudents());
  const [slots,setSlots]=useState(()=>{
    const sv=load('crm_slots_v4',null);if(sv)return sv;
    const st=load('crm_students_v3',null)||seedStudents();return seedSlots(st);
  });
  const [examDays,setExamDays]=useState(()=>load('crm_exam_days_v3',[]));
  const [schoolConfig,setSchoolConfig]=useState(()=>loadSchool());
  const [botUrl,setBotUrl]=useState(()=>schoolConfig.botUrl||load('crm_bot_url','http://localhost:3002'));
  const [botStatus,setBotStatus]=useState('unknown');
  const [lastSync,setLastSync]=useState(null);

  // Reset supabase client whenever school config changes (new credentials)
  useEffect(()=>{ resetSupabase(); },[schoolConfig]);

  const syncToSupabase=async()=>{
    const sb=getSupabase();
    if(!sb)throw new Error('Supabase no configurado');
    const studentsArr=load('crm_students_v3',students);
    const slotsObj=load('crm_slots_v4',slots);
    const profsArr=load('crm_professors_v3',professors);
    const slotsArr=Object.values(slotsObj);
    const errors=[];
    if(studentsArr.length){
      const {error}=await sb.from('students').upsert(studentsArr,{onConflict:'id'});
      if(error)errors.push('students: '+error.message);
    }
    if(slotsArr.length){
      const {error}=await sb.from('slots').upsert(slotsArr,{onConflict:'id'});
      if(error)errors.push('slots: '+error.message);
    }
    if(profsArr.length){
      const {error}=await sb.from('professors').upsert(profsArr,{onConflict:'id'});
      if(error)errors.push('professors: '+error.message);
    }
    if(errors.length)throw new Error(errors.join('; '));
  };

  useEffect(()=>save('crm_professors_v3',professors),[professors]);
  useEffect(()=>save('crm_vehicles_v3',vehicles),[vehicles]);
  useEffect(()=>save('crm_students_v3',students),[students]);
  useEffect(()=>save('crm_slots_v4',slots),[slots]);
  useEffect(()=>save('crm_exam_days_v3',examDays),[examDays]);
  useEffect(()=>save('crm_bot_url',botUrl),[botUrl]);

  // ── Sync con el bot ──────────────────────────────────────
  const syncFromBot=async(url=botUrl)=>{
    if(!url)return;
    try{
      const r=await fetch(`${url}/api/slots`,{signal:AbortSignal.timeout(3000)});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const arr=await r.json();
      // Mezclar: slots del bot sobreescriben/añaden al CRM
      setSlots(prev=>{
        const next={...prev};
        arr.forEach(bs=>{
          if(bs.status==='cancelled'){
            // Si está cancelado, quitar del calendario
            delete next[bs.id];
            // también buscar por date_time_profId
            const altKey=`${bs.date}_${bs.time}_${bs.profId}`;
            if(next[altKey]?.fromBot) delete next[altKey];
          } else {
            const crmS=botSlotToCRM(bs);
            next[bs.id]=crmS;
          }
        });
        return next;
      });
      // Sync alumnos (numClases actualizado por bot)
      const rs=await fetch(`${url}/api/students`,{signal:AbortSignal.timeout(3000)});
      if(rs.ok){
        const botStudents=await rs.json();
        setStudents(prev=>prev.map(s=>{
          const bs=botStudents.find(b=>b.id===s.id);
          if(bs&&bs.numClases!==undefined) return {...s,numClases:bs.numClases,botActive:bs.botActive};
          return s;
        }));
      }
      setBotStatus('ok');
      setLastSync(new Date());
    }catch(e){
      setBotStatus('error');
    }
  };

  // Auto-sync cada 15s cuando bot está conectado
  useEffect(()=>{
    if(!user)return;
    syncFromBot();
    const iv=setInterval(()=>syncFromBot(),15000);
    return()=>clearInterval(iv);
  },[user,botUrl]);

  // ── Wrapper setSlots que también envía al bot ────────────
  const setSlotsAndSync=async(updater)=>{
    setSlots(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      // Detectar slots nuevos o modificados y enviarlos al bot
      Object.values(next).forEach(s=>{
        const old=prev[s.id];
        const changed=!old||(old.confirmed!==s.confirmed)||(old.cancelled!==s.cancelled);
        if(changed&&botStatus==='ok'&&botUrl){
          fetch(`${botUrl}/api/slots`,{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify(crmSlotToBot(s.id,s))
          }).catch(()=>{});
        }
      });
      // Detectar slots eliminados
      Object.keys(prev).forEach(k=>{
        if(!next[k]&&botStatus==='ok'&&botUrl){
          fetch(`${botUrl}/api/slots/${k}`,{method:'DELETE'}).catch(()=>{});
        }
      });
      return next;
    });
  };

  const login=u=>{setUser(u);sessionStorage.setItem('crm_u',JSON.stringify(u));setPage(u.role==='admin'?'dashboard':'horario');};
  const logout=()=>{setUser(null);sessionStorage.removeItem('crm_u');};

  if(!user)return <LoginScreen onLogin={login} professors={professors}/>;

  const shared={students,professors,user};
  const pages={
    dashboard:      <Dashboard {...shared} slots={slots}/>,
    alumnos:        <Alumnos {...shared} setStudents={setStudents}/>,
    horario:        <Horario {...shared} slots={slots} setSlots={setSlotsAndSync} vehicles={vehicles} examDays={examDays} setExamDays={setExamDays}/>,
    disponibilidad: <Disponibilidad {...shared} slots={slots} setSlots={setSlotsAndSync}/>,
    profesores:     <Profesores {...shared} setProfessors={setProfessors}/>,
    vehiculos:      <Vehiculos user={user} vehicles={vehicles} setVehicles={setVehicles}/>,
    mensajes:       <Mensajes {...shared} slots={slots}/>,
    estadisticas:   <Estadisticas {...shared} slots={slots}/>,
    configuracion:  <Configuracion professors={professors} students={students} setStudents={setStudents}
                      setSlots={setSlots} setExamDays={setExamDays}
                      schoolConfig={schoolConfig} setSchoolConfig={setSchoolConfig}
                      onSyncSupabase={syncToSupabase}/>,
  };

  // Indicador de estado del bot en el sidebar
  const botIndicator=(
    <div style={{padding:'8px 14px',borderTop:'1px solid rgba(255,255,255,.07)'}}>
      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11}}>
        <div style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
          background:botStatus==='ok'?'#22c55e':botStatus==='error'?'#ef4444':'#94a3b8'}}/>
        <span style={{color:botStatus==='ok'?'#4ade80':botStatus==='error'?'#fca5a5':'rgba(255,255,255,.3)',flex:1}}>
          {botStatus==='ok'?`Bot conectado`:botStatus==='error'?'Bot desconectado':'Conectando...'}
        </span>
        {botStatus==='ok'&&<button onClick={()=>syncFromBot()}
          title="Sincronizar ahora"
          style={{background:'none',border:'none',color:'rgba(255,255,255,.3)',cursor:'pointer',padding:2}}>
          <Icon name="sync" size={13}/>
        </button>}
      </div>
      {lastSync&&botStatus==='ok'&&(
        <div style={{fontSize:10,color:'rgba(255,255,255,.2)',marginTop:2,marginLeft:13}}>
          Sync: {lastSync.toLocaleTimeString('es')}
        </div>
      )}
      {botStatus==='error'&&(
        <input value={botUrl} onChange={e=>setBotUrl(e.target.value)}
          onBlur={()=>syncFromBot(botUrl)}
          placeholder="http://localhost:3002"
          style={{marginTop:4,width:'100%',fontSize:10,padding:'3px 6px',borderRadius:4,
            border:'1px solid rgba(255,255,255,.15)',background:'rgba(255,255,255,.07)',
            color:'#fff',outline:'none'}}/>
      )}
    </div>
  );

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#f8f9ff'}}>
      <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
        <Sidebar page={page} setPage={setPage} user={user} onLogout={logout} professors={professors} schoolConfig={schoolConfig}/>
        {botIndicator}
      </div>
      <main style={{flex:1,overflow:'hidden',position:'relative'}}>
        {pages[page]||pages.dashboard}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
