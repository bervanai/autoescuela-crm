<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AutoEscuela CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#f8f9ff;color:#091426}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none;vertical-align:middle}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:#f1f5f9}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
  .fade-in{animation:fadeIn .18s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .slot-card{border-radius:5px;margin-bottom:2px;padding:3px 6px;cursor:pointer;transition:opacity .1s}
  .slot-card:hover{opacity:.82}
  .bubble-bot{background:#e7fbe6;border-radius:2px 12px 12px 12px;border:1px solid #bbf7d0;padding:10px 14px;max-width:78%;font-size:13px;line-height:1.5;color:#14532d}
  .bubble-user{background:#fff;border-radius:12px 2px 12px 12px;border:1px solid #e2e8f0;padding:10px 14px;max-width:78%;font-size:13px;line-height:1.5;color:#091426;align-self:flex-end}
  .chat-area{display:flex;flex-direction:column;gap:10px;padding:16px;overflow-y:auto;flex:1;background:#f0f4f8}
  .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ─── Constantes ────────────────────────────────────────────────────────────────
const PROFESSORS=[
  {id:'prof_inaki', name:'Iñaki',  color:'#1e3a5f', avatar:'IÑ'},
  {id:'prof_carlos',name:'Carlos', color:'#7c2d8c', avatar:'CA'},
  {id:'prof_maria', name:'María',  color:'#0e6856', avatar:'MA'},
];
const USERS=[
  {id:'admin',      name:'Admin',  role:'admin',    icon:'admin_panel_settings', color:'#fd761a'},
  {id:'prof_inaki', name:'Iñaki',  role:'profesor', icon:'directions_car',       color:'#1e3a5f'},
  {id:'prof_carlos',name:'Carlos', role:'profesor', icon:'directions_car',       color:'#7c2d8c'},
  {id:'prof_maria', name:'María',  role:'profesor', icon:'directions_car',       color:'#0e6856'},
];
const VEHICLES=[
  {id:'v1',name:'Seat Ibiza',    plate:'1234 ABC',type:'B'},
  {id:'v2',name:'Renault Clio',  plate:'5678 DEF',type:'B'},
  {id:'v3',name:'Ford Focus',    plate:'9012 GHI',type:'B'},
];
const TIME_SLOTS=['08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30',
                  '12:00','12:30','13:00','13:30','15:00','15:30','16:00','16:30',
                  '17:00','17:30','18:00','18:30','19:00'];
const DAY_NAMES=['Lun','Mar','Mié','Jue','Vie','Sáb'];

const NAMES_INAKI =['Ana García','Luis Martín','Carmen López','Javier Pérez','María Sánchez',
                    'Pedro Ruiz','Laura Torres','Sofía Moreno','Miguel Díaz','Elena Castro'];
const NAMES_CARLOS=['Roberto Jiménez','Natalia Romero','Sergio Navarro','Paula Ortiz','Diego Herrera',
                    'Alicia Flores','Raúl Gómez','Marta Ramos','Antonio Molina','Cristina Reyes'];
const NAMES_MARIA =['Fernando López','Sandra Muñoz','Pablo García','Lucia Fernández','Alberto Ruiz',
                    'Nuria Sánchez','Marcos Pérez','Irene Castro','David Torres','Patricia Vega'];

// ─── Storage ──────────────────────────────────────────────────────────────────
const load=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

// ─── Config de la autoescuela ─────────────────────────────────────────────────
const DEFAULT_SCHOOL={name:'AutoEscuela',color:'#fd761a',botUrl:'http://localhost:3002',setupDone:false};
const loadSchool=()=>load('crm_school_v1',DEFAULT_SCHOOL);
const saveSchool=v=>save('crm_school_v1',v);

// ─── Supabase helpers ─────────────────────────────────────────────────────────
let _supabase = null;
function getSupabase() {
  const cfg = loadSchool();
  if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) return null;
  if (!_supabase) {
    _supabase = window.supabase?.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  }
  return _supabase;
}
function resetSupabase() { _supabase = null; }

// ─── Contraseñas (pre-Supabase) ───────────────────────────────────────────────
const DEFAULT_PASSWORDS={admin:'1234'};
const loadPasswords=()=>load('crm_passwords_v1',DEFAULT_PASSWORDS);
const savePasswords=v=>save('crm_passwords_v1',v);

// ─── Seed ─────────────────────────────────────────────────────────────────────
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function seedStudents(){
  const all=[];
  [[NAMES_INAKI,'prof_inaki'],[NAMES_CARLOS,'prof_carlos'],[NAMES_MARIA,'prof_maria']].forEach(([names,pid],pi)=>{
    names.forEach((name,i)=>{
      all.push({
        id:`stu_${pi*10+i+1}`,name,
        phone:`6${Math.floor(10000000+Math.random()*89999999)}`,
        profId:pid,license:rnd(['B','B','B','A','B']),
        numClases:Math.floor(3+Math.random()*22),
        bono:rnd(['Bono 10','Bono 20','Bono 5','Sin bono']),
        tasasPagadas:Math.random()>0.28,active:true,
      });
    });
  });
  return all;
}
function seedSlots(students){
  const slots={};
  const today=new Date();today.setHours(0,0,0,0);
  for(let d=-10;d<=18;d++){
    const date=new Date(today);date.setDate(today.getDate()+d);
    if(date.getDay()===0)continue;
    const dateStr=date.toISOString().slice(0,10);
    PROFESSORS.forEach(prof=>{
      const ps=students.filter(s=>s.profId===prof.id&&s.active);
      let count=0;
      const times=[...TIME_SLOTS].sort(()=>Math.random()-.5);
      times.forEach(time=>{
        if(count>=5)return;
        if(Math.random()>0.52)return;
        const stu=rnd(ps); if(!stu)return;
        const veh=rnd(VEHICLES);
        const key=`${dateStr}_${time}_${prof.id}`;
        const isExam=Math.random()<0.12;
        slots[key]={id:key,date:dateStr,time,profId:prof.id,studentId:stu.id,
          vehicleId:veh.id,slotType:isExam?'examen':'practica',
          confirmed:Math.random()>0.35};
        count++;
      });
    });
  }
  return slots;
}
function freshDemo(){
  localStorage.removeItem('crm_students_v3');
  localStorage.removeItem('crm_slots_v4');
  localStorage.removeItem('crm_exam_days_v3');
  localStorage.removeItem('crm_professors_v3');
  localStorage.removeItem('crm_vehicles_v3');
  window.location.reload();
}

// ─── UI atoms ─────────────────────────────────────────────────────────────────
const Icon=({name,size=20,style={}})=>
  <span className="material-symbols-outlined" style={{fontSize:size,...style}}>{name}</span>;

const Avatar=({name,color,size=32})=>{
  const i=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return <div style={{width:size,height:size,borderRadius:'50%',background:color,
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:size*.38,fontWeight:700,color:'#fff',flexShrink:0}}>{i}</div>;
};
const Badge=({label,color='#1e3a5f'})=>
  <span className="tag" style={{background:color+'18',color,border:`1px solid ${color}33`}}>{label}</span>;
const Chip=({ok,label})=>
  <span className="tag" style={{background:ok?'#dcfce7':'#fee2e2',color:ok?'#166534':'#991b1b',
    border:`1px solid ${ok?'#86efac':'#fca5a5'}`}}>{label}</span>;

const inp="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-orange-400 focus:ring-1 focus:ring-orange-200";
const btnO="inline-flex items-center gap-1.5 bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors cursor-pointer";
const btnR="inline-flex items-center gap-1.5 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors cursor-pointer";
const btnG="inline-flex items-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-semibold transition-colors cursor-pointer border border-slate-200";

// ─── Modal ────────────────────────────────────────────────────────────────────
function Modal({title,onClose,children,width=500}){
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose()};
    document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h);
  },[]);
  return(
    <div className="fixed inset-0 flex items-center justify-center z-50 fade-in"
      style={{background:'rgba(9,20,38,0.6)',backdropFilter:'blur(4px)'}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:14,boxShadow:'0 32px 80px rgba(9,20,38,0.22)',
        width:'100%',maxWidth:width,maxHeight:'90vh',overflowY:'auto',padding:28}}
        onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h2 style={{fontSize:17,fontWeight:700,color:'#091426'}}>{title}</h2>
          <button onClick={onClose} style={{color:'#94a3b8',lineHeight:1}}><Icon name="close" size={22}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}
const F=({label,children})=>(
  <div className="mb-4">
    <label style={{display:'block',fontSize:11,fontWeight:600,color:'#64748b',marginBottom:4}}>{label}</label>
    {children}
  </div>
);

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin, professors}){
  const school=loadSchool();
  const [userId,setUserId]=useState('admin');
  const [pass,setPass]=useState('');
  const [error,setError]=useState('');
  const [showPass,setShowPass]=useState(false);

  // Construir lista de usuarios: admin + profesores activos
  const userList=[
    {id:'admin',name:'Administrador',role:'admin',icon:'admin_panel_settings',color:'#fd761a'},
    ...professors.filter(p=>p.active!==false).map(p=>({
      id:p.id,name:p.name,role:'profesor',icon:'directions_car',color:p.color||'#1e3a5f'
    }))
  ];

  const handleLogin=e=>{
    e.preventDefault();
    const u=userList.find(x=>x.id===userId);
    if(!u){setError('Selecciona un usuario');return;}
    const passwords=loadPasswords();
    const correctPwd=passwords[userId]||'1234';
    if(pass!==correctPwd){setError('Contraseña incorrecta');setPass('');return;}
    setError('');
    onLogin(u);
  };

  const ac=school.color||'#fd761a';
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      padding:24,background:'linear-gradient(145deg,#091426 0%,#0f2a4a 100%)'}}>
      <div style={{width:'100%',maxWidth:400}}>
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:14,marginBottom:10}}>
            <div style={{background:ac,borderRadius:16,padding:14,display:'flex',
              boxShadow:`0 8px 32px ${ac}55`}}>
              <Icon name="directions_car" size={32} style={{color:'#fff'}}/>
            </div>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:26,fontWeight:800,color:'#fff',letterSpacing:'-.5px'}}>{school.name}</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,.45)',marginTop:3}}>Panel de gestión</div>
            </div>
          </div>
        </div>

        {/* Form */}
        <form onSubmit={handleLogin}
          style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',
            borderRadius:18,padding:32,backdropFilter:'blur(12px)'}}>
          <div style={{marginBottom:20}}>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:'rgba(255,255,255,.5)',
              marginBottom:8,letterSpacing:'.5px',textTransform:'uppercase'}}>Usuario</label>
            <select value={userId} onChange={e=>setUserId(e.target.value)}
              style={{width:'100%',padding:'12px 14px',borderRadius:10,border:'1px solid rgba(255,255,255,.15)',
                background:'rgba(255,255,255,.08)',color:'#fff',fontSize:14,outline:'none',cursor:'pointer'}}>
              {userList.map(u=>(
                <option key={u.id} value={u.id} style={{background:'#0f2a4a',color:'#fff'}}>
                  {u.name} — {u.role==='admin'?'Administrador':'Profesor'}
                </option>
              ))}
            </select>
          </div>

          <div style={{marginBottom:24}}>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:'rgba(255,255,255,.5)',
              marginBottom:8,letterSpacing:'.5px',textTransform:'uppercase'}}>Contraseña</label>
            <div style={{position:'relative'}}>
              <input type={showPass?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)}
                placeholder="Introduce tu contraseña" autoComplete="current-password"
                style={{width:'100%',padding:'12px 42px 12px 14px',borderRadius:10,
                  border:`1px solid ${error?'#f87171':'rgba(255,255,255,.15)'}`,
                  background:'rgba(255,255,255,.08)',color:'#fff',fontSize:14,outline:'none'}}/>
              <button type="button" onClick={()=>setShowPass(v=>!v)}
                style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',
                  background:'none',border:'none',color:'rgba(255,255,255,.4)',cursor:'pointer',padding:0}}>
                <Icon name={showPass?'visibility_off':'visibility'} size={18}/>
              </button>
            </div>
            {error&&<p style={{color:'#f87171',fontSize:12,marginTop:6}}>{error}</p>}
          </div>

          <button type="submit"
            style={{width:'100%',padding:'13px',borderRadius:10,border:'none',cursor:'pointer',
              background:ac,color:'#fff',fontSize:15,fontWeight:700,
              boxShadow:`0 4px 20px ${ac}55`,transition:'opacity .15s'}}
            onMouseEnter={e=>e.currentTarget.style.opacity='.88'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
            Acceder
          </button>

          <p style={{textAlign:'center',fontSize:11,color:'rgba(255,255,255,.25)',marginTop:20}}>
            ¿Olvidaste la contraseña? Contacta con el administrador.
          </p>
        </form>
      </div>
    </div>
  );
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
const NAV_ADMIN=[
  {id:'dashboard',      icon:'dashboard',      label:'Dashboard'},
  {id:'alumnos',        icon:'school',         label:'Alumnos'},
  {id:'horario',        icon:'calendar_month', label:'Horario'},

const NAV_PROF=[

        })}

      <div style={{padding:'10px 8px',borderTop:'1px solid rgba(255,255,255,.07)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',marginBottom:4}}>
          {prof?<Avatar name={prof.name} color={prof.color} size={28}/>:
            <div style={{width:28,height:28,borderRadius:'50%',background:'#fd761a',display:'flex',

          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.38)'}}>{user.role==='admin'?'Administrador':'Profesor'}</div>
          </div>
        </div>
        <button onClick={onLogout}
          style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'7px 12px',
            borderRadius:8,fontSize:13,color:'rgba(255,255,255,.38)',cursor:'pointer',
            background:'transparent',border:'none',transition:'all .15s'}}
          onMouseEnter={e=>{e.currentTarget.style.color='#fff';e.currentTarget.style.background='rgba(255,255,255,.07)'}}
          onMouseLeave={e=>{e.currentTarget.style.color='rgba(255,255,255,.38)';e.currentTarget.style.background='transparent'}}>
          <Icon name="logout" size={16}/>Cerrar sesión
        </button>
      </div>
    </div>
  );
}

// ─── CARD / SECTION helpers ───────────────────────────────────────────────────
const Card=({children,className='',style={}})=>(
  <div className={className} style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,...style}}>
    {children}
  </div>
);
const SectionTitle=({children})=>(
  <h1 style={{fontSize:20,fontWeight:700,color:'#091426',marginBottom:20}}>{children}</h1>
);

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({students,slots,professors,user}){
  const isAdmin=user.role==='admin';
  const myStudents=isAdmin?students:students.filter(s=>s.profId===user.id);
  const slotArr=Object.values(slots).filter(s=>isAdmin||s.profId===user.id);
  const today=new Date().toISOString().slice(0,10);
  const todaySlots=slotArr.filter(s=>s.date===today);
  const now=new Date();
  const wS=new Date(now);wS.setDate(now.getDate()-now.getDay()+1);wS.setHours(0,0,0,0);
  const wE=new Date(wS);wE.setDate(wS.getDate()+6);
  const weekSlots=slotArr.filter(s=>{const d=new Date(s.date);return d>=wS&&d<=wE;});
  const upcoming=slotArr.filter(s=>s.date>=today).sort((a,b)=>a.date+a.time>b.date+b.time?1:-1).slice(0,12);

  const stats=[
    {icon:'school',        label:'Alumnos activos',    value:myStudents.filter(s=>s.active).length,    color:'#1e3a5f',bg:'#dbeafe'},
    {icon:'today',         label:'Clases hoy',          value:todaySlots.length,                        color:'#0e6856',bg:'#d1fae5'},
    {icon:'date_range',    label:'Clases esta semana',  value:weekSlots.length,                         color:'#b45309',bg:'#fef3c7'},
    {icon:'warning',       label:'Tasas pendientes',    value:myStudents.filter(s=>!s.tasasPagadas&&s.active).length, color:'#b91c1c',bg:'#fee2e2'},
  ];

  return(
    <div style={{padding:24,overflowY:'auto',height:'100%'}}>
      <SectionTitle>{isAdmin?'Dashboard — Resumen general':'Mi Panel'}</SectionTitle>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {stats.map(s=>(
          <Card key={s.label} style={{padding:18}}>
            <div style={{background:s.bg,borderRadius:9,padding:9,display:'inline-flex',marginBottom:10}}>
              <Icon name={s.icon} size={22} style={{color:s.color}}/>
            </div>
            <div style={{fontSize:28,fontWeight:800,color:'#091426',lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:12,color:'#64748b',marginTop:5}}>{s.label}</div>
          </Card>
        ))}
      </div>
      <Card>
        <div style={{padding:'14px 18px',borderBottom:'1px solid #f1f5f9',fontWeight:600,color:'#091426',fontSize:14}}>
          Próximas clases
        </div>
        {upcoming.length===0&&<div style={{padding:32,textAlign:'center',color:'#94a3b8'}}>No hay clases próximas</div>}
        {upcoming.map(slot=>{
          const stu=students.find(s=>s.id===slot.studentId);
          const prof=professors.find(p=>p.id===slot.profId);
          return(
            <div key={slot.id} style={{display:'flex',alignItems:'center',gap:12,
              padding:'10px 18px',borderBottom:'1px solid #f8fafc'}}>

// Tipos de vehículo con sus iconos y etiquetas
const VEHICLE_TYPES=[
  {id:'manual',     label:'Manual',      icon:'settings',        color:'#1e3a5f'},
  {id:'automatico', label:'Automático',  icon:'auto_mode',       color:'#7c2d8c'},
  {id:'moto',       label:'Moto',        icon:'two_wheeler',     color:'#0e6856'},
  {id:'camion',     label:'Camión',      icon:'local_shipping',  color:'#b45309'},
];
function getVehicleType(id){ return VEHICLE_TYPES.find(v=>v.id===id)||VEHICLE_TYPES[0]; }

// Calcula duración de clase: 45min si mismo tipo vehículo, 60min si cambia
function calcDuration(profId, date, time, studentVehicleType, allSlots){
  const slotsArr=Array.isArray(allSlots)?allSlots:Object.values(allSlots||{});
  // Slot anterior de ese profesor ese día (el de la hora anterior)
  const [h,m]=time.split(':').map(Number);
  const prevMins=h*60+m-60; // buscar clase que termine aquí (aprox)
  const daySlots=slotsArr.filter(s=>s.profId===profId&&s.date===date&&s.studentId&&s.status!=='cancelled'&&s.id!=='__new__');
  if(!daySlots.length) return 45;
  // Encontrar slot más cercano anterior
  const prev=daySlots
    .map(s=>{const[sh,sm]=s.time.split(':').map(Number);return{...s,mins:sh*60+sm};})
    .filter(s=>s.mins<h*60+m)
    .sort((a,b)=>b.mins-a.mins)[0];
  if(!prev) return 45;
  return prev.vehicleType===studentVehicleType ? 45 : 60;
}

    setSending(s=>({...s,[stu.id]:'sending'}));

                <div style={{display:'flex',gap:4}}>

                    onMouseEnter={e=>e.currentTarget.style.color='#b91c1c'}

                <Chip ok label="Activo"/>

                {autoCount>0&&<span style={{fontSize:10,fontWeight:700,background:'#7c2d8c',color:'#fff',padding:'2px 6px',borderRadius:3}}>{autoCount} Auto</span>}
                {motoCount>0&&<Badge label={`${motoCount} Moto`} color="#0e6856"/>}
              </div>
              <div style={{borderTop:'1px solid #f1f5f9',paddingTop:10,display:'flex',gap:6,flexWrap:'wrap'}}>

                {[

        {/* Tarjeta añadir */}
        <button onClick={()=>setAdding(true)}
          style={{border:'2px dashed #e2e8f0',borderRadius:12,padding:20,cursor:'pointer',background:'transparent',
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,
            color:'#94a3b8',transition:'all .15s',minHeight:160}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#fd761a';e.currentTarget.style.color='#fd761a'}}

      </div>

      {(adding||editing)&&<ProfModal prof={editing} onSave={handleSave} onClose={()=>{setAdding(false);setEditing(null)}}/>}

        <Modal title="Eliminar profesor" onClose={()=>setDeleting(null)} width={380}>
          <p style={{color:'#475569',marginBottom:20}}>¿Eliminar a <strong>{deleting.name}</strong>?</p>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button onClick={()=>setDeleting(null)} className={btnG}>Cancelar</button>

  );
}

function getWeek(offset=0){
  const d=new Date();
  d.setDate(d.getDate()-d.getDay()+1+offset*7);d.setHours(0,0,0,0);
  return Array.from({length:6},(_,i)=>{const dd=new Date(d);dd.setDate(d.getDate()+i);return dd;});
}

function Horario({slots,setSlots,students,vehicles,professors,user,examDays,setExamDays}){
  const isAdmin=user.role==='admin';
  const [off,setOff]=useState(0);
  const [vProf,setVProf]=useState(isAdmin?'all':user.id);
  const [fType,setFType]=useState('all');
  const [adding,setAdding]=useState(null);
  const [editing,setEditing]=useState(null);
  const week=getWeek(off);
  const today=new Date().toISOString().slice(0,10);
  const visProfs=vProf==='all'?professors:professors.filter(p=>p.id===vProf);

  const toggleExam=d=>{if(!isAdmin)return;setExamDays(ds=>ds.includes(d)?ds.filter(x=>x!==d):[...ds,d]);};
  const saveSlot=f=>{const k=`${f.date}_${f.time}_${f.profId}`;setSlots(ss=>({...ss,[k]:{...f,id:k}}));setAdding(null);setEditing(null);};
  const delSlot=id=>{setSlots(ss=>{const n={...ss};delete n[id];return n;});setEditing(null);};

  const exportSchedule=()=>{
    const profsToExport=vProf==='all'?professors:professors.filter(p=>p.id===vProf);
    const weekLabel=`${week[0].toLocaleDateString('es-ES',{day:'numeric',month:'short'})} – ${week[5].toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})}`;
    const DAY_FULL=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

    const tables=profsToExport.map(prof=>{
      const rows=TIME_SLOTS.map(time=>{
        const cells=week.map((d,di)=>{
          const ds=d.toISOString().slice(0,10);
          const isExam=examDays.includes(ds);
          if(isExam) return `<td style="background:#fff7ed;text-align:center;font-size:11px;color:#c2410c;">📝 Examen</td>`;
          const s=Object.values(slots).filter(sl=>sl.date===ds&&sl.time===time&&sl.profId===prof.id);
          if(!s.length) return `<td></td>`;
          return s.map(sl=>{
            const stu=students.find(x=>x.id===sl.studentId);
            const label=stu?.name||'?';
            const vt=stu?.vehicleType||'manual';
            const badge=vt==='automatico'?'<span style="background:#a855f7;color:#fff;font-size:9px;padding:1px 4px;border-radius:3px;margin-left:4px">A</span>':
                         vt==='moto'?'<span style="font-size:10px;margin-left:3px">🛵</span>':
                         vt==='camion'?'<span style="font-size:10px;margin-left:3px">🚛</span>':'';
            const dur=sl.duration||(stu?calcDuration(sl.profId,sl.date,sl.time,stu.vehicleType,slots):45);
            return `<div style="background:${sl.slotType==='examen'?'#581c87':'#1e3a8a'};color:#fff;border-radius:4px;padding:3px 6px;margin-bottom:2px;font-size:11px">
              <b>${label}</b>${badge} <span style="float:right;opacity:.7">${dur}′</span>
            </div>`;
          }).join('');
        });
        return `<tr><td style="color:#64748b;font-size:11px;white-space:nowrap;padding:3px 8px">${time}</td>${cells.map(c=>`<td style="vertical-align:top;padding:2px;min-width:110px">${c}</td>`).join('')}</tr>`;
      }).join('');

      return `
        <div style="page-break-after:always;padding:24px">
          <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #1e3a5f;padding-bottom:10px;margin-bottom:16px">
            <div>
              <div style="font-size:20px;font-weight:800;color:#091426">Horario — ${prof.name}</div>
              <div style="font-size:13px;color:#64748b;margin-top:2px">Semana del ${weekLabel}</div>
            </div>
            <div style="font-size:11px;color:#94a3b8">Generado el ${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
          </div>
          <table style="width:100%;border-collapse:collapse;font-family:system-ui,sans-serif">
            <thead>
              <tr style="background:#f8faff">
                <th style="padding:6px 8px;font-size:11px;color:#94a3b8;width:54px"></th>
                ${DAY_FULL.map((d,i)=>`<th style="padding:6px 8px;text-align:left;font-size:12px;color:#475569;border-bottom:1px solid #e2e8f0">
                  ${d}<br><span style="font-size:14px;font-weight:800;color:#091426">${week[i].getDate()}</span>
                </th>`).join('')}
              </tr>
            </thead>
            <tbody style="border-top:1px solid #e2e8f0">
              ${rows}
            </tbody>
          </table>
        </div>`;
    }).join('');

    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Horario Semanal</title>
      <style>*{box-sizing:border-box;margin:0;padding:0}body{background:#fff;font-family:system-ui,sans-serif}
      tr:hover{background:#f8faff}td{border-bottom:1px solid #f1f5f9}
      @media print{@page{margin:12mm}}</style>
      </head><body>${tables}
      <script>window.onload=()=>window.print()<\/script></body></html>`;

    const w=window.open('','_blank');
    w.document.write(html);
    w.document.close();
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      {/* toolbar */}
      <div style={{padding:'10px 16px',borderBottom:'1px solid #e2e8f0',display:'flex',
        alignItems:'center',gap:8,flexShrink:0,flexWrap:'wrap',background:'#fff'}}>
        <span style={{fontWeight:700,fontSize:15,color:'#091426'}}>Horario</span>
        <button onClick={()=>setOff(o=>o-1)} style={{border:'none',background:'none',cursor:'pointer',color:'#64748b',display:'flex'}}><Icon name="chevron_left" size={22}/></button>
        <span style={{fontSize:13,color:'#475569',minWidth:210,textAlign:'center'}}>
          {week[0].toLocaleDateString('es-ES',{day:'numeric',month:'short'})} – {week[5].toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})}
        </span>
        <button onClick={()=>setOff(o=>o+1)} style={{border:'none',background:'none',cursor:'pointer',color:'#64748b',display:'flex'}}><Icon name="chevron_right" size={22}/></button>
        <button onClick={()=>setOff(0)} style={{fontSize:12,color:'#fd761a',background:'none',border:'none',cursor:'pointer',fontWeight:600}}>Hoy</button>
        <div style={{flex:1}}/>
        {isAdmin&&(
          <select className={inp} style={{width:175}} value={vProf} onChange={e=>setVProf(e.target.value)}>

            {professors.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}

        <select className={inp} style={{width:130}} value={fType} onChange={e=>setFType(e.target.value)}>

            background:'#fff',color:'#475569',fontSize:12,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',transition:'all .15s'}}
          onMouseEnter={e=>{e.currentTarget.style.background='#f8faff';e.currentTarget.style.borderColor='#94a3b8';}}
          onMouseLeave={e=>{e.currentTarget.style.background='#fff';e.currentTarget.style.borderColor='#e2e8f0';}}>

        flexShrink:0,borderBottom:'1px solid #f1f5f9',background:'#fafbff'}}>
        <span style={{display:'flex',alignItems:'center',gap:4}}>
          <span style={{width:10,height:10,borderRadius:2,background:'#1e3a8a',display:'inline-block'}}/>Práctica
        </span>
        <span style={{display:'flex',alignItems:'center',gap:4}}>
          <span style={{width:10,height:10,borderRadius:2,background:'#581c87',display:'inline-block'}}/>Examen
        </span>
